<!DOCTYPE html>
<html>
<head>

<title>IPL Win Predictor</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
}

.container{
background:white;
padding:30px;
width:600px;
margin:auto;
margin-top:50px;
border-radius:10px;
box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

input,select{
padding:10px;
width:90%;
margin:8px;
}

button{
padding:12px 20px;
background:#ff4b4b;
color:white;
border:none;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:22px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>IPL Win Predictor</h1>

<form action="/predict" method="post">

<select name="batting_team" required>
<option>Select Batting Team</option>
{% for team in teams %}
<option value="{{team}}">{{team}}</option>
{% endfor %}
</select>

<select name="bowling_team" required>
<option>Select Bowling Team</option>
{% for team in teams %}
<option value="{{team}}">{{team}}</option>
{% endfor %}
</select>

<select name="city" required>
<option>Select City</option>
{% for city in cities %}
<option value="{{city}}">{{city}}</option>
{% endfor %}
</select>

<input type="number" name="target" placeholder="Target" required>

<input type="number" name="score" placeholder="Score" required>

<input type="number" step="0.1" name="overs" placeholder="Overs Completed" required>

<input type="number" name="wickets" placeholder="Wickets Out" required>

<br>

<button type="submit">Predict Probability</button>

</form>

{% if win %}

<div class="result">
<p>{{batting_team}} : {{win}} %</p>
<p>{{bowling_team}} : {{loss}} %</p>
</div>

{% endif %}

</div>

</body>
</html>
